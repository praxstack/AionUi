<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes idle-breathe{0%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(.97) translateY(.3px)}}@keyframes idle-sway{0%{transform:rotate(0deg)}25%{transform:rotate(1.2deg)}75%{transform:rotate(-1.2deg)}}@keyframes idle-blink{0%,8%{transform:scaleY(1)}4%{transform:scaleY(.08)}}@keyframes idle-shadow-pulse{0%{transform:scaleX(1);opacity:.35}50%{transform:scaleX(.96);opacity:.28}}.idle-body{transform-origin:11px 18px;animation:idle-breathe 3.2s ease-in-out infinite,idle-sway 6s ease-in-out infinite}.idle-eye{transform-origin:11px 11px;animation:idle-blink 4s ease-in-out infinite}.idle-shadow{transform-origin:11px 22.5px;animation:idle-shadow-pulse 3.2s ease-in-out infinite}</style></defs><ellipse cx="11" cy="22.5" fill="silver" class="idle-shadow" rx="4" ry=".6"/><g class="idle-track"><g class="idle-body"><rect width="3" height="3" x="2" y="9" fill="#8891b8" opacity=".7" rx=".5" transform="rotate(45 3.5 10.5)"/><rect width="3" height="3" x="17" y="9" fill="#8891b8" opacity=".7" rx=".5" transform="rotate(45 18.5 10.5)"/><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><polygon fill="#FF6B35" points="11 1 15 7 7 7"/><rect width="1" height="1" x="10" y="2" fill="#e8714a"/><g class="idle-eye"><g class="idle-pupil"><rect width="2" height="2" x="10" y="10" fill="#111827"/></g></g><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1" d="M8 13.5 Q11 16.5 14 13.5"/></g></g></svg>