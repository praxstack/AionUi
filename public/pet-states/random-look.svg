<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes look-sway{0%{transform:rotate(0)}25%{transform:rotate(6deg) translateX(1px)}75%{transform:rotate(-6deg) translateX(-1px)}}@keyframes look-eye{0%,50%{transform:translateX(0)}25%{transform:translateX(2px)}75%{transform:translateX(-2px)}}@keyframes look-shadow{0%{transform:scaleX(1);opacity:.35}25%{transform:scaleX(.95) translateX(1px);opacity:.3}75%{transform:scaleX(.95) translateX(-1px);opacity:.3}}.look-body{transform-origin:11px 18px;animation:look-sway 4s ease-in-out infinite}.look-eye{animation:look-eye 4s ease-in-out infinite}.look-shadow{transform-origin:11px 22.5px;animation:look-shadow 4s ease-in-out infinite}</style></defs><ellipse cx="11" cy="22.5" fill="silver" class="look-shadow" rx="4" ry=".6"/><g class="look-body"><rect width="3" height="3" x="2" y="9" fill="#8891b8" opacity=".7" rx=".5" transform="rotate(45 3.5 10.5)"/><rect width="3" height="3" x="17" y="9" fill="#8891b8" opacity=".7" rx=".5" transform="rotate(45 18.5 10.5)"/><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><polygon fill="#FF6B35" points="11 1 15 7 7 7"/><rect width="1" height="1" x="10" y="2" fill="#e8714a"/><g class="look-eye"><rect width="2" height="2" x="10" y="10" fill="#111827"/></g><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1" d="M8 13.5 Q11 16.5 14 13.5"/></g></svg>