<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes wake-lift{0%,12%{transform:translateY(4px)}35%,90%{transform:translateY(0)}50%{transform:translateY(-6px)}65%{transform:translateY(1px)}78%{transform:translateY(-2px)}}@keyframes wake-flat-out{0%,15%{opacity:1}35%{opacity:0}}@keyframes wake-round-in{0%,15%{opacity:0;transform:scaleY(.7) scaleX(1.2)}30%{opacity:1;transform:scaleY(1) scaleX(1)}45%{transform:scaleY(1.2) scaleX(.88)}60%{transform:scaleY(.93) scaleX(1.05)}75%{transform:scaleY(1.03) scaleX(.98)}85%{transform:scaleY(1) scaleX(1)}}@keyframes wake-eye{0%,20%{transform:scaleY(.05)}32%{transform:scaleY(.4)}38%{transform:scaleY(1.4)}48%{transform:scaleY(1)}}@keyframes wake-arm-l{0%,20%{transform:rotate(15deg) translateY(3px)}45%{transform:rotate(-140deg) translateY(-3px)}58%{transform:rotate(-150deg) translateY(-4px)}75%{transform:rotate(0)}}@keyframes wake-arm-r{0%,20%{transform:rotate(-15deg) translateY(3px)}45%{transform:rotate(140deg) translateY(-3px)}58%{transform:rotate(150deg) translateY(-4px)}75%{transform:rotate(0)}}@keyframes wake-base{0%,18%{opacity:1}38%{opacity:0}}@keyframes wake-z{0%,5%{transform:translate(14px,4px) scale(.5);opacity:.9}15%{transform:translate(18px,-4px) scale(.9);opacity:.6}25%{transform:translate(20px,-10px) scale(.4);opacity:0}26%{opacity:0;transform:scale(0)}}@keyframes wake-star-pop{0%{transform:translate(0,0) scale(0);opacity:0}15%{transform:translate(var(--tx),var(--ty)) scale(1.2);opacity:1}40%{transform:translate(var(--tx2),var(--ty2)) scale(.8);opacity:.7}70%{opacity:0}}@keyframes waking-shadow-pulse{0%,12%,90%{transform:scaleX(1);opacity:.35}35%{transform:scaleX(.88);opacity:.28}50%{transform:scaleX(.92);opacity:.32}}.wake-all{transform-origin:11px 17px;animation:wake-lift 4s ease-in-out infinite}.wake-flat{animation:wake-flat-out 4s ease-in-out infinite}.wake-round{transform-origin:11px 12px;animation:wake-round-in 4s ease-in-out infinite}.waking-shadow{transform-origin:11px 18px;animation:waking-shadow-pulse 4s ease-in-out infinite}.wake-eye{transform-origin:11px 11px;animation:wake-eye 4s ease-in-out infinite}.wake-arm-l{transform-origin:3.5px 13px;animation:wake-arm-l 4s ease-in-out infinite}.wake-arm-r{transform-origin:18px 13px;animation:wake-arm-r 4s ease-in-out infinite}.wake-base{animation:wake-base 4s ease-in-out infinite}.wake-z1{animation-delay:0s}.wake-z1,.wake-z2,.wake-z3{animation:wake-z 4s ease-in-out infinite}.wake-z2{animation-delay:.3s}.wake-z3{animation-delay:.6s}.wake-star{opacity:0}.wake-star1{animation-delay:2.2s}.wake-star1,.wake-star2,.wake-star3{animation:wake-star-pop 4s ease-out infinite}.wake-star2{animation-delay:2.4s}.wake-star3{animation-delay:2.6s}</style><g id="wake-pz"><rect width="3" height=".7" x="0" y="0"/><rect width=".8" height=".8" x="1.6" y=".7"/><rect width=".8" height=".8" x=".7" y="1.5"/><rect width="3" height=".7" x="0" y="2.3"/></g></defs><use fill="#8891b8" class="wake-z1" href="#wake-pz"/><use fill="#a0a8c8" class="wake-z2" href="#wake-pz"/><use fill="#c0c8e0" class="wake-z3" href="#wake-pz"/><ellipse cx="11" cy="18" fill="silver" class="waking-shadow" rx="4" ry=".6"/><rect width="18" height="1" x="2" y="18" fill="#D9D9D9" class="wake-base" rx=".3"/><g class="wake-all"><g class="wake-arm-l"><rect width="3.5" height="3.5" x="1" y="12" fill="#97A0C5" fill-opacity=".7" rx="1.75"/></g><g class="wake-arm-r"><path fill="#B9C3EB" d="M16.34 14.35C17.08 13.6 18.28 13.6 19.03 14.34C19.77 15.08 19.77 16.28 19.03 17.03C18.29 17.77 17.09 17.77 16.35 17.03C15.6 16.29 15.6 15.09 16.34 14.35Z"/></g><g class="wake-flat"><rect width="16" height="10" x="3" y="7" fill="#97A0C5" rx="5"/><path fill="#FF5B24" d="M14.2041 6.85L7.7959 6.85L11 1.3L14.2041 6.85Z"/><path stroke="#000" stroke-linecap="round" d="M8 11H11"/><path stroke="#000" stroke-linecap="round" d="M7 13C8.85 15.12 12.15 15.12 14 13"/></g><g class="wake-round"><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><path fill="#FF5B24" d="M14.2041 6.85L7.7959 6.85L11 1.3L14.2041 6.85Z"/><g class="wake-eye"><rect width="2" height="2" x="10" y="10" fill="#111827" rx="1"/></g><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1.1" d="M8 13.5 Q11 17 14 13.5"/></g></g><rect style="--tx:-8px;--ty:-10px;--tx2:-10px;--ty2:-14px" width="1.5" height="1.5" x="11" y="8" fill="#e8714a" class="wake-star wake-star1" rx=".4"/><rect style="--tx:8px;--ty:-12px;--tx2:11px;--ty2:-16px" width="1.2" height="1.2" x="11" y="8" fill="#FF5B24" class="wake-star wake-star2" rx=".3"/><rect style="--tx:-5px;--ty:-14px;--tx2:-7px;--ty2:-18px" width="1" height="1" x="11" y="8" fill="#94BDFF" class="wake-star wake-star3" rx=".25"/></svg>