<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes bd-bounce{0%{transform:translateY(0) scaleY(1) scaleX(1)}30%{transform:translateY(-3px) scaleY(1.06) scaleX(.95)}60%{transform:translateY(1.5px) scaleY(.94) scaleX(1.05)}}@keyframes bd-spark{0%{transform:translate(0,0) scale(1);opacity:1}}@keyframes bd-shadow{0%{transform:scaleX(1);opacity:.3}30%{transform:scaleX(.8);opacity:.15}60%{transform:scaleX(1.1);opacity:.35}}.bd-all{transform-origin:11px 17px;animation:bd-bounce .55s cubic-bezier(.36,.07,.19,.97) infinite}.bd-gear{transform-origin:19px 8px;animation:bd-spin 2s linear infinite}.bd-block-l{transform-origin:4px 16px;animation:bd-wobble-l .55s ease-in-out infinite alternate}.bd-block-r{transform-origin:18px 16px;animation:bd-wobble-r .55s ease-in-out infinite alternate}.bd-spark1{animation-delay:0s}.bd-spark1,.bd-spark2,.bd-spark3{animation:bd-spark 1s ease-out infinite}.bd-spark2{animation-delay:.33s}.bd-spark3{animation-delay:.66s}.bd-shadow{transform-origin:11px 25px;animation:bd-shadow .55s cubic-bezier(.36,.07,.19,.97) infinite}</style></defs><ellipse cx="11" cy="25" fill="silver" class="bd-shadow" rx="7" ry=".75"/><g class="bd-all"><g class="bd-gear"><circle cx="19" cy="8" r="3" fill="none" stroke="#ffc94d" stroke-width="1.2"/><circle cx="19" cy="8" r="1.2" fill="#ffc94d"/><rect width="1.4" height="1.2" x="18.3" y="4.5" fill="#ffc94d" rx=".3"/><rect width="1.4" height="1.2" x="18.3" y="10.3" fill="#ffc94d" rx=".3"/><rect width="1.2" height="1.4" x="15.5" y="7.3" fill="#ffc94d" rx=".3"/><rect width="1.2" height="1.4" x="21.3" y="7.3" fill="#ffc94d" rx=".3"/></g><rect width="1" height="1" x="17" y="12" fill="#e8714a" class="bd-spark1" rx=".3"/><rect width=".8" height=".8" x="19" y="14" fill="#FF9500" class="bd-spark2" rx=".2"/><rect width=".7" height=".7" x="15" y="13" fill="#e8714a" class="bd-spark3" rx=".2"/><g class="bd-block-l"><rect width="4" height="4" x="1" y="13" fill="#7c91e8" rx=".8"/><rect width="1" height="1.5" x="2.5" y="11.8" fill="#7c91e8" rx=".4"/></g><g class="bd-block-r"><rect width="4" height="4" x="17" y="13" fill="#e87c7c" rx=".8"/><rect width="1" height="1.5" x="18.5" y="11.8" fill="#e87c7c" rx=".4"/></g><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><polygon fill="#FF6B35" points="11 1 15 7 7 7"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1.2" d="M9 11 Q11 9.5 13 11"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width=".9" d="M9 14 Q11 16 13 14"/></g></svg>