<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes happy-jump{0%{transform:translateY(0) scaleY(1)}12%,88%{transform:translateY(0) scaleY(.86)}30%,70%{transform:translateY(-7px) scaleY(1.07)}50%{transform:translateY(-8px) scaleY(1)}}@keyframes happy-shadow{0%{transform:scaleX(1);opacity:.35}30%,70%{transform:scaleX(.4);opacity:.07}}@keyframes happy-spark-flash{0%,30%{opacity:0}10%{opacity:1}}.happy-body{transform-origin:11px 18px;animation:happy-jump 1s ease-in-out infinite}.happy-shadow{transform-origin:11px 22.5px;animation:happy-shadow 1s ease-in-out infinite}.happy-arm-l{transform-origin:3.5px 10.5px;animation:happy-arm-l .5s ease-in-out infinite alternate}.happy-arm-r{transform-origin:18.5px 10.5px;animation:happy-arm-r .5s ease-in-out infinite alternate}.happy-spark{opacity:0}.happy-sp1{animation-delay:0s}.happy-sp1,.happy-sp2,.happy-sp3,.happy-sp4{animation:happy-spark-flash 1.5s step-end infinite}.happy-sp2{animation-delay:.5s}.happy-sp3{animation-delay:1s}.happy-sp4{animation-delay:.75s}</style></defs><g fill="#e8714a" class="happy-spark happy-sp1"><rect width="1" height="1" x="1" y="4"/><rect width="3" height=".5" x="0" y="5"/><rect width="1" height="1" x="1" y="6"/></g><g fill="#FF9F3F" class="happy-spark happy-sp2"><rect width="1" height="1" x="19" y="2"/><rect width="3" height=".5" x="18" y="3"/><rect width="1" height="1" x="19" y="4"/></g><g fill="#FFF59D" class="happy-spark happy-sp3"><rect width="1" height="1" x="20" y="11"/><rect width="3" height=".5" x="19" y="12"/><rect width="1" height="1" x="20" y="13"/></g><g fill="#FFB3C6" class="happy-spark happy-sp4"><rect width="1" height="1" x="-2" y="10"/><rect width="3" height=".5" x="-3" y="11"/><rect width="1" height="1" x="-2" y="12"/></g><ellipse cx="11" cy="22.5" fill="silver" class="happy-shadow" rx="4" ry=".6"/><g class="happy-body"><g class="happy-arm-l"><rect width="3" height="3" x="2" y="9" fill="#8891b8" opacity=".8" rx=