<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes doze-nod{0%{transform:rotate(0) translateY(0)}40%{transform:rotate(5deg) translateY(2px)}55%{transform:rotate(-3deg) translateY(-1px)}70%{transform:rotate(3deg) translateY(1px)}}@keyframes doze-shadow{0%{transform:scaleX(1);opacity:.3}40%{transform:scaleX(1.05);opacity:.35}}@keyframes doze-z{0%{opacity:0;transform:translate(14px,6px) scale(.4)}20%{opacity:.7}80%{opacity:.3}}.doze-body{transform-origin:11px 18px;animation:doze-nod 2.5s ease-in-out infinite}.doze-shadow{transform-origin:11px 22.5px;animation:doze-shadow 2.5s ease-in-out infinite}.doze-z1,.doze-z2{animation:doze-z 3.5s ease-in-out infinite;animation-delay:0s;opacity:0}.doze-z2{animation-delay:1.2s}</style><g id="doze-pz"><rect width="2.5" height=".6" x="0" y="0"/><rect width=".7" height=".7" x="1.3" y=".6"/><rect width=".7" height=".7" x=".5" y="1.3"/><rect width="2.5" height=".6" x="0" y="2"/></g></defs><use fill="#8891b8" class="doze-z1" href="#doze-pz"/><use fill="#a0a8c8" class="doze-z2" href="#doze-pz"/><ellipse cx="11" cy="22.5" fill="silver" class="doze-shadow" rx="4" ry=".6"/><g class="doze-body"><rect width="3" height="3" x="2" y="10" fill="#8891b8" opacity=".55" rx=".5" transform="rotate(45 3.5 11.5)"/><rect width="3" height="3" x="17" y="10" fill="#8891b8" opacity=".55" rx=".5" transform="rotate(45 18.5 11.5)"/><rect width="12" height="12" x="5" y="6" fill="#9098b8" rx="6"/><polygon fill="#d45a2a" points="11 1 15 7 7 7" transform="rotate(-10 11 5)"/><rect width="1" height="1" x="10" y="2" fill="#e8714a" transform="rotate(-10 11 5)"/><rect width="4" height=".8" x="9" y="10.5" fill="#111827" rx=".4"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width=".8" d="M9.5 13.5 Q11 14.5 12.5 13.5"/></g></svg>