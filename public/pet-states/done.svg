<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes done-jump{0%{transform:translateY(0) scaleY(1)}12%,88%{transform:translateY(0) scaleY(.86)}30%,70%{transform:translateY(-7px) scaleY(1.07)}50%{transform:translateY(-8px) scaleY(1)}}@keyframes done-shadow{0%{transform:scaleX(1);opacity:.35}30%,70%{transform:scaleX(.4);opacity:.07}}@keyframes done-spark-flash{0%,30%{opacity:0}10%{opacity:1}}@keyframes done-bubble-pop{0%{transform:scale(0)}60%{transform:scale(1.2)}}.done-body{transform-origin:11px 18px;animation:done-jump 1s ease-in-out infinite}.done-shadow{transform-origin:11px 22.5px;animation:done-shadow 1s ease-in-out infinite}.done-arm-l{transform-origin:3.5px 10.5px;animation:done-arm-l .5s ease-in-out infinite alternate}.done-arm-r{transform-origin:18.5px 10.5px;animation:done-arm-r .5s ease-in-out infinite alternate}.done-spark{opacity:0}.done-sp1{animation-delay:0s}.done-sp1,.done-sp2,.done-sp3,.done-sp4{animation:done-spark-flash 1.5s step-end infinite}.done-sp2{animation-delay:.5s}.done-sp3{animation-delay:1s}.done-sp4{animation-delay:.75s}.done-bubble{transform-origin:21px 9px;transform:scale(0);animation:done-bubble-pop .4s cubic-bezier(.34,1.56,.64,1) .15s forwards}.done-chk{stroke-dasharray:8;stroke-dashoffset:8;animation:done-chk-draw .25s ease-out .5s forwards}</style></defs><g fill="gold" class="done-spark done-sp1"><rect width="1" height="1" x="1" y="4"/><rect width="3" height=".5" x="0" y="5"/><rect width="1" height="1" x="1" y="6"/></g><g fill="#FF9F3F" class="done-spark done-sp2"><rect width="1" height="1" x="19" y="2"/><rect width="3" height=".5" x="18" y="3"/><rect width="1" height="1" x="19" y="4"/></g><g fill="#FFF59D" class="done-spark done-sp3"><rect width="1" height="1" x="20" y="11"/><rect width="3" height=".5" x="19" y="12"/><rect width="1" height="1" x="20" y="13"/></g><g fill="#FFB3C6" class="done-spark done-sp4"><rect width="1" height="1" x="-2" y="10"/><rect width="3" height=".5" x="-3