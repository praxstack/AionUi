<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes yawn-lean{0%{transform:translateY(0) rotate(0)}35%,65%{transform:translateY(-1px) rotate(-4deg)}}@keyframes yawn-open{0%,15%,85%{transform:scale(.4)}30%{transform:scale(1.1)}50%{transform:scale(1.3)}70%{transform:scale(1)}}@keyframes yawn-hand{0%,15%,85%{transform:rotate(0) translateY(0)}30%,70%{transform:rotate(-40deg) translateY(-2px)}}@keyframes yawn-shadow{0%{transform:scaleX(1);opacity:.3}50%{transform:scaleX(1.03);opacity:.35}}.yawn-body{transform-origin:11px 18px;animation:yawn-lean 3.5s ease-in-out infinite}.yawn-mouth{transform-origin:11px 14.5px;animation:yawn-open 3.5s ease-in-out infinite}.yawn-hand{transform-origin:16px 14px;animation:yawn-hand 3.5s ease-in-out infinite}.yawn-shadow{transform-origin:11px 22.5px;animation:yawn-shadow 3.5s ease-in-out infinite}</style></defs><ellipse cx="11" cy="22.5" fill="silver" class="yawn-shadow" rx="4" ry=".6"/><g class="yawn-body"><rect width="3" height="3" x="2" y="10" fill="#8891b8" opacity=".6" rx=".5" transform="rotate(45 3.5 11.5)"/><g class="yawn-hand"><rect width="3.5" height="3.5" x="16" y="10" fill="#8891b8" opacity=".8" rx="1.75"/></g><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><polygon fill="#FF6B35" points="11 1 15 7 7 7" transform="rotate(-6 11 5)"/><rect width="1" height="1" x="10" y="2" fill="#e8714a" transform="rotate(-6 11 5)"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1" d="M8.5 11.5 Q9.5 10.5 10.5 11.5"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width="1" d="M11.5 11.5 Q12.5 10.5 13.5 11.5"/><g class="yawn-mouth"><ellipse cx="11" cy="14.5" fill="#e8a0a0" rx="1.8" ry="2.2"/><ellipse cx="11" cy="14" fill="#d07070" rx="1.3" ry="1.5"/></g></g></svg>