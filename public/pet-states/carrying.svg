<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" fill="none" viewBox="-18 -18 58 58"><defs><style>@keyframes carry-walk{0%{transform:translateX(0) translateY(0) rotate(0)}25%{transform:translateX(1px) translateY(-1.5px) rotate(2deg)}75%{transform:translateX(-1px) translateY(-1.5px) rotate(-2deg)}}@keyframes carry-shadow{0%{transform:scaleX(1);opacity:.3}25%,75%{transform:scaleX(.85);opacity:.2}}@keyframes carry-box-bob{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(-.5px) rotate(1deg)}75%{transform:translateY(-.5px) rotate(-1deg)}}.carry-body{transform-origin:11px 18px;animation:carry-walk .6s ease-in-out infinite}.carry-shadow{transform-origin:11px 22.5px;animation:carry-shadow .6s ease-in-out infinite}.carry-box{transform-origin:11px 16px;animation:carry-box-bob .6s ease-in-out infinite}</style></defs><ellipse cx="11" cy="22.5" fill="silver" class="carry-shadow" rx="5" ry=".6"/><g class="carry-body"><rect width="12" height="12" x="5" y="6" fill="#97A0C5" rx="6"/><polygon fill="#FF6B35" points="11 1 15 7 7 7"/><rect width="1" height="1" x="10" y="2" fill="#e8714a"/><rect width="4" height="1" x="9" y="10.5" fill="#111827" rx=".5"/><path fill="none" stroke="#111827" stroke-linecap="round" stroke-width=".9" d="M9 14 Q11 12.5 13 14"/><g class="carry-box"><rect width="3" height="3" x="4" y="12" fill="#8891b8" opacity=".8" rx="1.5"/><rect width="3" height="3" x="15" y="12" fill="#8891b8" opacity=".8" rx="1.5"/><rect width="10" height="7" x="6" y="14" fill="#c8a96e" rx="1"/><rect width="10" height="7" x="6" y="14" fill="none" stroke="#a08040" stroke-width=".5" rx="1"/><rect width="2" height="7" x="10" y="14" fill="#e0c070" opacity=".7" rx=".3"/><rect width="3" height=".7" x="7" y="15" fill="#fff" opacity=".3" rx=".3"/></g></g></svg>